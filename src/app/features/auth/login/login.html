<div class="content-body">
    
    <div class="col-xl-9 col-lg-8">
        <div class="card profile-card card-bx m-b30">
            <div class="card-header">
                <h6 class="title">Use your credentials here</h6>
                
            </div>
            
            <form class="profile-form" [formGroup] = "loginForm" (ngSubmit)="onSubmit()" >
                <div class="card-body">
                    <div class="row">
                        <div class="col-sm-6 m-b30">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" formControlName="username" required>
                        </div>
                        <div class="col-sm-6 m-b30">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" formControlName="password" required>
                        </div>
                        <div class="col-sm-6 m-b30">
                            <label class="form-label">SystemId</label>
                            <input type="number" class="form-control" formControlName="systemId" required>
                        </div>
                    </div>
                </div>
                <div class="card-footer">
                    <button class="btn btn-primary" type="submit">Login</button>
                </div>
            </form>
        </div>
    </div>
</div>
