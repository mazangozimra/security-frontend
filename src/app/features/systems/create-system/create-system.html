<div class="create-system-container">
  <div class="header">
    <button type="button" class="btn-back" (click)="goBack()">
      ← Back
    </button>
    <h1>Create New System</h1>
  </div>

  <form class="system-form" [formGroup]="systemForm" (ngSubmit)="onSubmit()" >
    
    <div class="form-group">
      <div class="col-sm-6 m-b30">
        <label class="form-label">Name</label>
                            
        <input type="text" class="form-control" formControlName="name" required>
       
      </div>
      <div class="col-sm-6 m-b30">
        <label class="form-label">Description</label>
                            
        <input type="text" class="form-control" formControlName="description" required>
       
       </div>                
    
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit">Create System</button>
    </div>
  </form>
</div>
